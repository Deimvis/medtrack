{{define "medication-row.html"}}
{{$m := .Data}}
{{$bp := .BasePath}}
<tr id="row-{{$m.ID}}" class="row-status-{{$m.Status}}">
  <td data-label="Name">
    <span class="med-name">{{$m.Name}}</span>
  </td>

  <td data-label="Dose" class="combo combo-dose">
    <div class="combo-stack">
      <button class="counter-btn"
              hx-post="{{$bp}}/medications/{{$m.ID}}/dose"
              hx-target="#row-{{$m.ID}}"
              hx-swap="outerHTML"
              aria-label="Record one dose"
              title="Record one dose">
        <span class="counter-value">{{$m.UsedInCycle}}{{if $m.PerCycleLabel}}/{{$m.PerCycleLabel}}{{end}}</span>
        <span class="counter-arrow" aria-hidden="true">⬆</span>
      </button>
      {{if $m.IntervalWarning}}<span class="interval-warning" title="{{$m.IntervalWarning}}">⚠</span>{{end}}
      <details class="menu">
        <summary aria-label="More dose actions">⋮</summary>
        <div class="menu-list">
          <button type="button"
                  hx-post="{{$bp}}/medications/{{$m.ID}}/dose/revert"
                  hx-target="#row-{{$m.ID}}"
                  hx-swap="outerHTML">Revert one</button>
          <a href="{{$bp}}/medications/{{$m.ID}}/log">View log</a>
        </div>
      </details>
    </div>
  </td>

  <td data-label="Cycle" class="combo combo-cycle">
    <div class="combo-stack">
      <button class="counter-btn"
              hx-post="{{$bp}}/medications/{{$m.ID}}/cycle"
              hx-target="#row-{{$m.ID}}"
              hx-swap="outerHTML"
              aria-label="Advance to next cycle"
              title="Advance to next cycle">
        <span class="counter-value">{{$m.CycleIndex}}{{if $m.CyclesTotalLabel}}/{{$m.CyclesTotalLabel}}{{end}}</span>
        <span class="counter-arrow" aria-hidden="true">⬆</span>
      </button>
      {{if $m.CycleLabel}}<span class="muted small">· {{$m.CycleLabel}}</span>{{end}}
      <details class="menu">
        <summary aria-label="More cycle actions">⋮</summary>
        <div class="menu-list">
          <button type="button"
                  hx-post="{{$bp}}/medications/{{$m.ID}}/cycle/revert"
                  hx-target="#row-{{$m.ID}}"
                  hx-swap="outerHTML">Revert cycle</button>
        </div>
      </details>
    </div>
  </td>

  <td data-label="First in cycle">{{if $m.FirstInCycle}}{{$m.FirstInCycle}}{{else}}<span class="muted">—</span>{{end}}</td>
  <td data-label="Last in cycle">{{if $m.LastInCycle}}{{$m.LastInCycle}}{{else}}<span class="muted">—</span>{{end}}</td>

  <td data-label="Actions" class="actions row-actions">
    <a class="edit-link" href="{{$bp}}/medications/{{$m.ID}}/edit" title="Edit" aria-label="Edit medication">
      <svg class="icon-pen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M15.6287 5.12132L4.31497 16.435M15.6287 5.12132L19.1642 8.65685M15.6287 5.12132L17.0429 3.70711C17.4334 3.31658 18.0666 3.31658 18.4571 3.70711L20.5784 5.82843C20.969 6.21895 20.969 6.85212 20.5784 7.24264L19.1642 8.65685M7.85051 19.9706L4.31497 16.435M7.85051 19.9706L19.1642 8.65685M7.85051 19.9706L3.25431 21.0312L4.31497 16.435"/>
      </svg>
    </a>
    <button class="btn btn-danger ghost"
            hx-delete="{{$bp}}/medications/{{$m.ID}}"
            hx-target="#med-table"
            hx-swap="outerHTML"
            aria-label="Delete medication"
            hx-confirm="Delete {{$m.Name}}? It will be removed from the diary; its event log is kept and remains visible on the Log page."><span class="icon-x" aria-hidden="true">×</span></button>
  </td>
</tr>
{{end}}
